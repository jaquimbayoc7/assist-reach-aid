name: CI/CD - Production

# ──────────────────────────────────────────────────────────────
# STAGE 3 — PRODUCTION
# Trigger: push o PR a main
# Resultado: aprobación manual → Render auto-despliega hab-frontend
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build (Prod)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: https://hab-backend.onrender.com
          VITE_ENVIRONMENT: production
        run: npm run build

      - name: Lint
        run: npm run lint

  deploy-approval:
    name: "🔐 Approval Gate — Deploy to Production"
    runs-on: ubuntu-latest
    needs: [frontend-build]
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Production deploy approved
        run: |
          echo "✅ Production deploy approved."
          echo "🚀 Render is deploying to PRODUCTION from main branch."
          echo "   Frontend PROD: https://hab-frontend.onrender.com"
          echo "   Backend PROD:  https://hab-backend.onrender.com"

  frontend-smoke-test-prod:
    name: Smoke Test — PROD
    runs-on: ubuntu-latest
    needs: [deploy-approval]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for Render PROD deploy
        run: |
          echo "Waiting 90s for Render PROD to finish deploying..."
          sleep 90

      - name: Smoke test — frontend PROD accesible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hab-frontend.onrender.com)
          echo "Frontend PROD status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend PROD not accessible (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Frontend PROD OK"

      - name: Smoke test — backend PROD /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hab-backend.onrender.com/health)
          echo "Backend PROD health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend PROD health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Backend PROD /health OK"

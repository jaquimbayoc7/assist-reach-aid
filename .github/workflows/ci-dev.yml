name: CI - Development

# ──────────────────────────────────────────────────────────────
# STAGE 1 — DEV
# Trigger: push o PR a develop
# Resultado: build pasa → Render auto-despliega hab-frontend-dev
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  frontend-build:
    name: Frontend Build (Dev)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: https://hab-backend-dev.onrender.com
          VITE_ENVIRONMENT: development
        run: npm run build

      - name: Lint
        run: npm run lint

  notify-dev-ready:
    name: Notify DEV deploy ready
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: DEV environment ready
        run: |
          echo "✅ Frontend build passed on develop."
          echo "🚀 Render will auto-deploy to DEV: https://hab-frontend-dev.onrender.com"
          echo "📋 API Backend DEV: https://hab-backend-dev.onrender.com"
